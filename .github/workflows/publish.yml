name: Publish

on:
  workflow_dispatch:
    inputs:
      release:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test -- run

      - run: pnpm build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, tag, and push
        run: pnpm bumpp --yes --release ${{ inputs.release }}

      # pnpm shells out to whatever npm is on PATH for `pnpm publish`, which is
      # unreliable with OIDC trusted publishing (https://github.com/pnpm/pnpm/issues/9812).
      # Publish with npm directly instead; it requires npm >= 11.5.1 for trusted publishing.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Publish to npm
        run: npm publish --access public
